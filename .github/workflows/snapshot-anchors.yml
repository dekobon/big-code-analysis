name: Snapshot anchors

# Block new bare insta::assert_json_snapshot! calls in src/metrics/.
# See AGENTS.md "Validation gates" and check-snapshot-anchors.py.

on:
  pull_request:
    paths:
      - 'src/metrics/**.rs'
      - '.snapshot-anchor-baseline.txt'
      - 'check-snapshot-anchors.py'
      - '.github/workflows/snapshot-anchors.yml'
  push:
    branches:
      - main
    paths:
      - 'src/metrics/**.rs'
      - '.snapshot-anchor-baseline.txt'
      - 'check-snapshot-anchors.py'
      - '.github/workflows/snapshot-anchors.yml'

permissions:
  contents: read

jobs:
  check:
    name: check-snapshot-anchors
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run snapshot-anchor lint
        run: python3 check-snapshot-anchors.py
