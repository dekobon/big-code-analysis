# taplo configuration
#
# Scope taplo to first-party TOML files only. Vendored grammar crates
# (tree-sitter-*) and the test-fixture repositories under tests/repositories
# follow upstream formatting and must not be reformatted by this project's
# tooling. The enums/ crate is excluded from the workspace and is owned by
# its own conventions.
include = [
    "Cargo.toml",
    "big-code-analysis-cli/**/*.toml",
    "big-code-analysis-py/**/*.toml",
    "big-code-analysis-web/**/*.toml",
    "big-code-analysis-book/**/*.toml",
    "xtask/**/*.toml",
    "mise.toml",
    ".typos.toml",
    "bca.toml",
]
exclude = [
    "target/**",
    "tests/repositories/**",
    "tree-sitter-*/**",
    "enums/**",
    ".claude/**",
    ".git/**",
    # .bca-baseline.toml is generated by `bca check --write-baseline`;
    # taplo formatting would diverge from bca's output and break the
    # byte-identical regenerate-on-unchanged-tree contract.
    ".bca-baseline.toml",
    # Python virtual environments (developer-local, gitignored) carry
    # vendored typeshed stub TOMLs that follow upstream formatting —
    # taplo must not descend into them.
    "**/.venv/**",
    "**/venv/**",
]
