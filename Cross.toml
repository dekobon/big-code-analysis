# Cross.toml — cross-rs build-time tweaks per target.
#
# x86_64-unknown-freebsd:
#   cross-rs/docker/freebsd.sh copies libcxxrt.so into the target
#   sysroot but never creates the libcxxrt.so.1 symlink that
#   libc++.so embeds as its NEEDED entry. Without the symlink,
#   linking any C++ object (tree-sitter-ccomment/mozcpp/preproc
#   scanners) fails with "libcxxrt.so.1, needed by libc++.so, not
#   found". The pre-build hook runs inside the cross docker
#   container right before cargo build and patches the sysroot in
#   place — no host-side state, no upstream cross fork required.
#   See https://github.com/cross-rs/cross/blob/main/docker/freebsd.sh
#   for the original install commands.
[target.x86_64-unknown-freebsd]
pre-build = [
  "ln -sf libcxxrt.so /usr/local/x86_64-unknown-freebsd12/lib/libcxxrt.so.1",
]
