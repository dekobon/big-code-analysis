; checkmake configuration -- https://github.com/mrtazz/checkmake
;
; Run with: checkmake --config .checkmake.ini Makefile
;
; The default maxBodyLength of 5 is too aggressive for orchestration
; Makefiles that contain self-documenting help blocks and multi-step
; fmt/lint pipelines. The cap accommodates the self-documenting help
; target (which grows by one line per public target) plus compound
; pipelines while still flagging genuinely runaway recipes that
; should be split into helper scripts. Bumped from 80 to 90 when
; #405's enums-codegen-drift target pushed help past the prior cap.

[maxbodylength]
maxBodyLength = 90
