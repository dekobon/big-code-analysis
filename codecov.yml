# Codecov configuration.
#
# Coverage is produced by the `coverage` job in
# .github/workflows/ci.yml, which uploads codecov.json (region
# coverage) generated by cargo-llvm-cov.

coverage:
  status:
    # Informational while a baseline settles: Codecov posts the project /
    # patch delta as a commit status and a PR comment, but never fails the
    # check on a dip. Flip `informational` to false once the baseline is
    # trusted and coverage should gate merges.
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  # Skip the comment entirely when a PR does not change coverage, to keep
  # noise down on docs-only / CI-only changes.
  require_changes: true

# Coverage arrives under two flags from two jobs: `rust` (cargo-llvm-cov,
# always runs) and `python` (pytest-cov, only on PRs that touch the
# bindings). carryforward keeps the python number from vanishing on
# Rust-only PRs, where the python-test job is skipped.
flag_management:
  default_rules:
    carryforward: true

# The python coverage report is written from big-code-analysis-py/ with
# relative paths (python/big_code_analysis/...). Re-root them at the repo
# so Codecov attributes lines to the checked-in files. Rust paths are
# already repo-rooted and are unaffected (the prefix does not match).
fixes:
  - "python/big_code_analysis/::big-code-analysis-py/python/big_code_analysis/"

# Exclude vendored grammars, code-generation helpers, and test/build
# harnesses from the coverage denominator so the reported number reflects
# the library's own measurable surface.
ignore:
  - "tree-sitter-ccomment/**"
  - "tree-sitter-mozcpp/**"
  - "tree-sitter-mozjs/**"
  - "tree-sitter-preproc/**"
  - "tree-sitter-tcl/**"
  - "enums/**"
  - "xtask/**"
  - "**/tests/**"
  - "**/build.rs"
