repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-executables-have-shebangs
    -   id: check-merge-conflict
    -   id: check-symlinks
    -   id: check-yaml
    -   id: check-json
        exclude: enums/templates/json.json
-   repo: https://github.com/marco-c/taskcluster_yml_validator
    rev: v0.0.12
    hooks:
      - id: taskcluster_yml
-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Bump in lockstep with the big-code-analysis-py/pyproject.toml
    # `ruff>=0.6,<0.16` floor. `ruff-check` and `ruff-format` are the
    # current hook IDs (the legacy `ruff` alias is deprecated).
    rev: v0.15.14
    hooks:
    -   id: ruff-check
        args: [--fix]
        files: ^big-code-analysis-py/.*\.py$
    -   id: ruff-format
        files: ^big-code-analysis-py/.*\.py$
-   repo: local
    hooks:
      # FIXME: Uncomment when fmt is fixed
      # - id: fmt
      #   name: fmt
      #   language: system
      #   files: '\.rs$'
      #   exclude: '.*/templates/.*\.rs$'
      #   entry: cargo fmt -- --check --verbose

      - id: clippy
        name: clippy
        language: system
        files: '\.rs$'
        entry: cargo clippy --all-targets --all -- -D warnings
        pass_filenames: false

      - id: udeps
        name: udeps
        language: system
        files: '\.rs$'
        entry: cargo +nightly udeps --all-targets
        pass_filenames: false

      - id: test
        name: test
        language: system
        files: '\.rs$'
        entry: cargo test
        pass_filenames: false

      # actionlint validates GitHub Actions workflow syntax and shells
      # out to shellcheck for `run:` blocks. `language: system` so the
      # contributor's PATH-resolved `actionlint` is used (the binary is
      # a single Go executable — see utils/check-tools.sh for install
      # hints). The hook only fires on workflow files under
      # `.github/workflows/` and on the actionlint config itself,
      # because `actionlint` with no args (matching the `make
      # actionlint` recipe) discovers exactly those — composite
      # actions in `.github/actions/*/action.yml` would be matched but
      # not actually checked, so listing them here would be misleading.
      # When composite actions are added, pass them to actionlint
      # explicitly rather than just widening this regex.
      - id: actionlint
        name: actionlint
        language: system
        files: '^\.github/(workflows/.*\.ya?ml|actionlint\.ya?ml)$'
        entry: actionlint -no-color
        pass_filenames: false

      - id: snapshot-anchors
        name: snapshot-anchors
        language: system
        files: '^(src/metrics/.*\.rs|\.snapshot-anchor-baseline\.txt|check-snapshot-anchors\.py)$'
        entry: python3 check-snapshot-anchors.py
        pass_filenames: false

      # Lockstep version invariant — every owned crate and every
      # `=<v>` internal-dep pin must match the workspace version.
      # See RELEASING.md "Lockstep version policy".
      - id: check-versions
        name: check-versions
        language: system
        files: '(Cargo\.toml|/Cargo\.toml|/bindings/rust/README\.md|^README\.md|^STABILITY\.md|big-code-analysis-book/src/library/(quick-start|cargo-features|stability)\.md|check-versions\.py)$'
        entry: python3 check-versions.py
        pass_filenames: false

      # The `enums/` crate is workspace-excluded, so the workspace
      # clippy/test hooks above never touch it. Add a dedicated check
      # so warnings here cannot drift (see #164).
      - id: enums-check
        name: enums-check
        language: system
        files: '^enums/.*\.(rs|toml|lock)$'
        entry: make enums-check
        pass_filenames: false

      # Strict rustdoc gate (broken intra-doc links, links into private
      # items, etc.). Wired here in addition to `make pre-commit` /
      # `make ci` so the `pre-commit run --all-files` invocation path
      # honours the same gate — see lesson 21 in
      # docs/development/lessons_learned.md on parity between the three
      # call sites (local make aggregate, pre-commit framework, CI).
      - id: doc-check
        name: doc-check
        language: system
        files: '\.rs$'
        entry: make doc-check
        pass_filenames: false

      # mypy --strict against the bindings crate. Implemented as a
      # `language: system` hook (rather than `pre-commit/mirrors-mypy`)
      # because pre-commit's isolated venv cannot see the project's
      # `maturin develop`'d `_native` extension or the rest of the
      # dev environment — under that isolation, `--strict`'s whole-
      # program analysis is silently meaningless. The system hook runs
      # against the contributor's PATH-resolved `mypy`, same pattern
      # as the clippy/udeps/test hooks above.
      #
      # pyright is intentionally NOT a pre-commit hook: it bundles a
      # Node runtime that pre-commit cannot hermetically isolate and
      # suffers the same isolated-venv problem mypy does. The CI
      # `python-lint` job covers it.
      - id: py-mypy
        name: py-mypy
        language: system
        # Match both `.py` source and `.pyi` stubs — editing
        # `_native.pyi` must also re-run mypy so the stub stays in
        # sync with the Rust-side ABI it describes.
        files: '^big-code-analysis-py/.*\.pyi?$'
        # Use --config-file + absolute-ish paths so the invocation is
        # cross-platform — `bash -c "cd X && ..."` fails on native
        # Windows pre-commit (no bash on cmd/PowerShell PATH).
        entry: mypy
        args:
          - --strict
          - --config-file=big-code-analysis-py/pyproject.toml
          - big-code-analysis-py/python
          - big-code-analysis-py/tests
          - big-code-analysis-py/examples
        pass_filenames: false

default_language_version:
    python: python3
