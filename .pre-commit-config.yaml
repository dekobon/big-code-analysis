repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-executables-have-shebangs
    -   id: check-merge-conflict
    -   id: check-symlinks
    -   id: check-yaml
    -   id: check-json
        exclude: enums/templates/json.json
-   repo: https://github.com/marco-c/taskcluster_yml_validator
    rev: v0.0.12
    hooks:
      - id: taskcluster_yml
-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Bump in lockstep with the big-code-analysis-py/pyproject.toml
    # `ruff>=0.6,<0.16` floor. `ruff-check` and `ruff-format` are the
    # current hook IDs (the legacy `ruff` alias is deprecated).
    rev: v0.15.14
    hooks:
    -   id: ruff-check
        args: [--fix]
        files: ^big-code-analysis-py/.*\.py$
    -   id: ruff-format
        files: ^big-code-analysis-py/.*\.py$
-   repo: local
    hooks:
      # FIXME: Uncomment when fmt is fixed
      # - id: fmt
      #   name: fmt
      #   language: system
      #   files: '\.rs$'
      #   exclude: '.*/templates/.*\.rs$'
      #   entry: cargo fmt -- --check --verbose

      - id: clippy
        name: clippy
        language: system
        files: '\.rs$'
        entry: cargo clippy --all-targets --all -- -D warnings
        pass_filenames: false

      - id: udeps
        name: udeps
        language: system
        files: '\.rs$'
        entry: cargo +nightly udeps --all-targets
        pass_filenames: false

      - id: test
        name: test
        language: system
        files: '\.rs$'
        entry: cargo test
        pass_filenames: false

      # actionlint validates GitHub Actions workflow syntax and shells
      # out to shellcheck for `run:` blocks. `language: system` so the
      # contributor's PATH-resolved `actionlint` is used (the binary is
      # a single Go executable — see utils/check-tools.sh for install
      # hints). The hook only fires on workflow files under
      # `.github/workflows/` and on the actionlint config itself,
      # because `actionlint` with no args (matching the `make
      # actionlint` recipe) discovers exactly those — composite
      # actions in `.github/actions/*/action.yml` would be matched but
      # not actually checked, so listing them here would be misleading.
      # When composite actions are added, pass them to actionlint
      # explicitly rather than just widening this regex.
      - id: actionlint
        name: actionlint
        language: system
        files: '^\.github/(workflows/.*\.ya?ml|actionlint\.ya?ml)$'
        entry: actionlint -no-color
        pass_filenames: false

      - id: snapshot-anchors
        name: snapshot-anchors
        language: system
        files: '^(src/metrics/.*\.rs|\.snapshot-anchor-baseline\.txt|check-snapshot-anchors\.py)$'
        entry: python3 check-snapshot-anchors.py
        pass_filenames: false

      # Block grammar-marker bumps in tree-sitter-{mozjs,mozcpp}
      # without a matching source regen (see #400). The marker is
      # a Dependabot notification hook only — Cargo never compiles
      # it, and bumping it does NOT regenerate the bundled
      # `src/parser.c` / `src/scanner.c`. The gate compares the
      # live marker line in each vendored Cargo.toml against
      # `.grammar-marker-baseline.toml`; drift fails. Invokes
      # `python3` directly to match the sibling `snapshot-anchors`
      # / `check-versions` hooks and avoid the `make` dependency.
      - id: grammar-marker-sync
        name: grammar-marker-sync
        language: system
        files: '^(tree-sitter-(mozjs|mozcpp)/Cargo\.toml|\.grammar-marker-baseline\.toml|check-grammar-marker-sync\.py)$'
        entry: python3 check-grammar-marker-sync.py
        pass_filenames: false

      # Self-tests for the grammar-marker-sync gate itself. Runs
      # on edits to either the script or its test file. Kept as a
      # separate hook so the gate hook above remains a one-line
      # invariant check and the tests get their own clear pass/fail
      # in `pre-commit run` output.
      - id: grammar-marker-sync-test
        name: grammar-marker-sync-test
        language: system
        files: '^check-grammar-marker-sync(-test)?\.py$'
        entry: python3 -m unittest -q check-grammar-marker-sync-test.py
        pass_filenames: false

      # Block enums codegen drift (#405). Runs the codegen into a
      # tempdir and diffs against the checked-in
      # `src/c_langs_macros/*.rs` and `src/languages/language_*.rs`
      # files. Triggered by edits to anything that can change the
      # codegen output: the templates, the source crate, the input
      # data files, or the checked-in artifacts themselves.
      - id: enums-codegen-drift
        name: enums-codegen-drift
        language: system
        files: '^(enums/.+|src/(c_langs_macros|languages)/[^/]+\.rs|check-enums-codegen-drift\.sh)$'
        entry: bash check-enums-codegen-drift.sh
        pass_filenames: false

      # Catch clap-vs-man-page drift before push. The
      # `.github/workflows/ci.yml` `manpage` job (Regenerate, then
      # `git diff --exit-code -- man/`) is the upstream backstop;
      # this hook makes the same check available locally and via
      # `pre-commit run --all-files`. The hook fails on drift and
      # leaves the regenerated files in the working tree — same
      # side effect CI runs into, accepted because man pages are
      # generated artifacts.
      #
      # The `files:` filter covers every input that can change the
      # generated `.1` output:
      #   - clap definitions in the two CLI crates and xtask itself
      #   - the binary version (which `clap_mangen` writes into
      #     every page's `.TH` header) — propagated via the
      #     lockstep version policy through every owned
      #     Cargo.toml, so we trigger on any of those
      #   - direct edits to `man/*.1`
      # Cargo.lock is intentionally excluded — too noisy for a
      # local hook; the CI `manpage` job catches dep-induced drift.
      - id: manpages
        name: manpages
        language: system
        files: '^(big-code-analysis-cli/(src/.*\.rs|Cargo\.toml)|big-code-analysis-web/(src/.*\.rs|Cargo\.toml)|xtask/(src/.*\.rs|Cargo\.toml)|Cargo\.toml|man/.*\.1)$'
        entry: make manpages-check
        pass_filenames: false

      # Lockstep version invariant — every owned crate and every
      # `=<v>` internal-dep pin must match the workspace version.
      # See RELEASING.md "Lockstep version policy".
      - id: check-versions
        name: check-versions
        language: system
        files: '(Cargo\.toml|/Cargo\.toml|/bindings/rust/README\.md|^README\.md|^STABILITY\.md|big-code-analysis-book/src/library/(quick-start|cargo-features|stability)\.md|check-versions\.py)$'
        entry: python3 check-versions.py
        pass_filenames: false

      # The `enums/` crate is workspace-excluded, so the workspace
      # clippy/test hooks above never touch it. Add a dedicated check
      # so warnings here cannot drift (see #164).
      - id: enums-check
        name: enums-check
        language: system
        files: '^enums/.*\.(rs|toml|lock)$'
        entry: make enums-check
        pass_filenames: false

      # bca self-scan threshold gate (hard tier). Mirrors the
      # `Threshold gate` step in .github/workflows/pages.yml. The
      # hook fails when any function regresses past
      # `bca-thresholds.toml` minus the `.bca-baseline.toml`
      # ratchet. When you intentionally bump a limit, edit
      # `bca-thresholds.toml` with a why-comment in the same commit;
      # when you intentionally accept new offenders, run
      # `make self-scan-write-baseline` and commit the resulting
      # diff. `files` mirrors the inputs that can change the gate's
      # verdict — analysed Rust source, the threshold config, the
      # baseline itself, and `.bcaignore` — and `exclude` matches
      # the directories `.bcaignore` already filters out so the
      # hook does not re-fire for changes the gate already skips.
      - id: bca-self-scan
        name: bca-self-scan
        language: system
        files: '(\.rs$|^bca-thresholds\.toml$|^\.bca-baseline\.toml$|^\.bcaignore$)'
        # Mirrors `.bcaignore` so the hook does not fire for `.rs`
        # edits in paths the gate already excludes (vendored grammars,
        # tests, generated trees, docs/, packaging/, utils/, man/,
        # examples/ anywhere in the tree). Keep this list aligned with
        # `.bcaignore` — if either drifts the hook either fires for
        # nothing or misses real input changes.
        exclude: '^(tree-sitter-[^/]+/|tests/|.*/tests/|.*_tests\.rs$|enums/|big-code-analysis-book/|docs/|packaging/|utils/|xtask/|generate-grammars/|man/|abuild-keys/|.*/examples/)'
        entry: make self-scan
        pass_filenames: false

      # bca self-scan threshold gate (soft tier). Scales every
      # threshold in `bca-thresholds.toml` by `BCA_HEADROOM`
      # (default 0.95) and runs the same baseline-ratcheted check.
      # Fails when a function has crept into the 95-100% band of
      # any limit without being baselined — gives a one-or-two-
      # commit lead time to either refactor or raise the limit
      # before the hard gate trips. Override with
      # `BCA_HEADROOM=0.90 pre-commit run bca-self-scan-headroom`
      # to widen the band.
      - id: bca-self-scan-headroom
        name: bca-self-scan-headroom
        language: system
        files: '(\.rs$|^bca-thresholds\.toml$|^\.bca-baseline\.toml$|^\.bcaignore$)'
        # Mirrors `.bcaignore` so the hook does not fire for `.rs`
        # edits in paths the gate already excludes (vendored grammars,
        # tests, generated trees, docs/, packaging/, utils/, man/,
        # examples/ anywhere in the tree). Keep this list aligned with
        # `.bcaignore` — if either drifts the hook either fires for
        # nothing or misses real input changes.
        exclude: '^(tree-sitter-[^/]+/|tests/|.*/tests/|.*_tests\.rs$|enums/|big-code-analysis-book/|docs/|packaging/|utils/|xtask/|generate-grammars/|man/|abuild-keys/|.*/examples/)'
        entry: make self-scan-headroom
        pass_filenames: false

      # Strict rustdoc gate (broken intra-doc links, links into private
      # items, etc.). Wired here in addition to `make pre-commit` /
      # `make ci` so the `pre-commit run --all-files` invocation path
      # honours the same gate — see lesson 21 in
      # docs/development/lessons_learned.md on parity between the three
      # call sites (local make aggregate, pre-commit framework, CI).
      - id: doc-check
        name: doc-check
        language: system
        files: '\.rs$'
        entry: make doc-check
        pass_filenames: false

      # mypy --strict against the bindings crate. Implemented as a
      # `language: system` hook (rather than `pre-commit/mirrors-mypy`)
      # because pre-commit's isolated venv cannot see the project's
      # `maturin develop`'d `_native` extension or the rest of the
      # dev environment — under that isolation, `--strict`'s whole-
      # program analysis is silently meaningless. The system hook runs
      # against the contributor's PATH-resolved `mypy`, same pattern
      # as the clippy/udeps/test hooks above.
      #
      # pyright is intentionally NOT a pre-commit hook: it bundles a
      # Node runtime that pre-commit cannot hermetically isolate and
      # suffers the same isolated-venv problem mypy does. The CI
      # `python-lint` job covers it.
      - id: py-mypy
        name: py-mypy
        language: system
        # Match both `.py` source and `.pyi` stubs — editing
        # `_native.pyi` must also re-run mypy so the stub stays in
        # sync with the Rust-side ABI it describes.
        files: '^big-code-analysis-py/.*\.pyi?$'
        # Use --config-file + absolute-ish paths so the invocation is
        # cross-platform — `bash -c "cd X && ..."` fails on native
        # Windows pre-commit (no bash on cmd/PowerShell PATH).
        entry: mypy
        args:
          - --strict
          - --config-file=big-code-analysis-py/pyproject.toml
          - big-code-analysis-py/python
          - big-code-analysis-py/tests
          - big-code-analysis-py/examples
        pass_filenames: false

default_language_version:
    python: python3
