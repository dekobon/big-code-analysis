# Grammar-marker-sync baseline.
# Records the upstream-grammar crate version that was in effect
# when the vendored sources under tree-sitter-{mozjs,mozcpp}/src/
# were last regenerated. See #400 for context.

# Operational notes:
#
# The marker dependency in each vendored crate's Cargo.toml
# (`tree-sitter-javascript` for mozjs, `tree-sitter-cpp` for
# mozcpp) is a Dependabot notification hook only — Cargo never
# compiles it. Bumping it does NOT regenerate the bundled
# `src/parser.c` / `src/scanner.c`. Drift between the marker and
# the baseline fails `check-grammar-marker-sync.py`.
#
# After re-running `./generate-grammars/generate-{mozjs,mozcpp}.sh`
# and committing the regenerated sources, refresh the entry below
# in the same commit. Easiest path:
#     ./check-grammar-marker-sync.py --update
# That command updates `marker` and `version` in place,
# preserving the per-section audit notes that follow each
# section's body.

[mozjs]
marker = "tree-sitter-javascript"
version = "0.25.0"
# Last source regen: #1141 (2025-03-30, marker was at 0.23.1).
# The 0.23.1 -> 0.25.0 marker bump (#1207, 2026-01-20) shipped
# without the matching regen; #400 confirmed that the 0.25.0 regen
# is a no-op against tree-sitter CLI 0.26.9 so the baseline is
# pinned at the current marker.

[mozcpp]
marker = "tree-sitter-cpp"
version = "0.23.4"
# Last source regen: #1141 (2025-03-30).
# A 0.23.4 regen run on 2026-05-28 produced a non-empty diff
# (1.5M-line parser.c churn + metric-value shifts) — handling
# that snapshot review is deferred to a separate PR (see
# follow-up issue #406). The baseline stays at 0.23.4 until that
# review lands.
