# rumdl configuration.
#
# MD024 `siblings-only` accommodates the Keep a Changelog convention
# of repeating `### Added` / `### Changed` etc. across version
# sections. MD013 line-length is widened to 120 to match the project's
# editorconfig; tables and code blocks are exempt because their layout
# is dictated by content, not rewrap-friendly prose. MD033 allows a
# small set of inline HTML elements that render meaningfully on
# GitHub / mdBook (badges, anchor blocks, line breaks, collapsible
# sections). MD060 (table-column-style) is disabled — our tables are
# content-driven and the bot-aligned style would force noisy padding
# edits on every column-width change.
#
# The remaining `disable` entries below are rules rumdl enables by
# default that the previous markdownlint-cli2 setup did not. They are
# disabled to keep the 2026-05-26 tool swap behaviour-preserving:
#
#   MD034 — bare URLs. The auto-fix wraps reference-style link
#           definition targets in `<…>`, which is allowed but
#           cosmetically wrong (the rule should not fire on
#           `[label]: url` definitions).
#   MD046 — code-block-style. RELEASING.md mixes fenced and indented
#           code blocks deliberately (indented blocks render as
#           literal terminal output without language tagging). The
#           auto-conversion is intrusive.
#   MD052 — reference-not-found. Appears to misparse link
#           definitions inside blockquotes — the one observed hit
#           (`reuse-tree.md` `[with_only]`) has its definition
#           inside the same blockquote as the use, yet still trips
#           the rule. Disabled until upstream is verified or a
#           reproducer is filed.
#   MD057 — broken relative links. mdBook renders `.md` → `.html`,
#           so `../commands/index.html` references resolve in the
#           rendered site but not on disk.
#   MD076 — blank lines between list items. Many historical
#           CHANGELOG entries use this style for readability across
#           wide nested lists.

[global]
disable = [
    "MD034",
    "MD046",
    "MD052",
    "MD057",
    "MD060",
    "MD076",
]
exclude = [
    "target/**",
    "node_modules/**",
    ".claude/**",
    "tests/repositories/**",
    "big-code-analysis-book/book/**",
]

[MD013]
line-length = 120
tables = false
code-blocks = false

[MD024]
siblings-only = true

[MD033]
# Inline HTML elements that GitHub / mdBook render meaningfully and
# have no clean markdown equivalent. Keep this list narrow: if you
# reach for <kbd>, <sub>, <sup>, <em>, etc., prefer the markdown
# equivalent (`**`, `*`, …) and don't extend the allowlist.
#   a       — anchored links with id= / target="_blank"
#   img     — README badges and inline diagrams
#   br      — hard line breaks inside table cells
#   details — collapsible sections in long READMEs
#   summary — header row of a <details> block
allowed-elements = ["a", "img", "br", "details", "summary"]
