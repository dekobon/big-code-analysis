[alias]
# Canonical cargo-mutants invocation for local runs. Mirrors the flags
# used by the scheduled `.github/workflows/mutation-test.yml` workflow
# so local triage matches CI output. See
# `docs/development/mutation_testing.md`.
mutants = "mutants --package big-code-analysis --no-shuffle --in-place"
# `cargo xtask` regenerates man pages under `man/` from the live clap
# definitions of `bca` and `bca-web`. CI gates committed pages against
# its output (see `.github/workflows/ci.yml` job `manpage`).
xtask = "run --package xtask --"
